name: Build & Release Binaries

on:
  release:
    types: [created]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.21"

      - name: Download Dependencies
        run: go mod download

      # --- BUILD TAKA-UPLOAD (For Lua Plugin) ---
      - name: Build Taka-Upload
        run: |
          env GOOS=linux GOARCH=amd64 go build -o taka-upload-linux-amd64 cmd/upload/main.go
          env GOOS=darwin GOARCH=amd64 go build -o taka-upload-darwin-amd64 cmd/upload/main.go
          env GOOS=darwin GOARCH=arm64 go build -o taka-upload-darwin-arm64 cmd/upload/main.go

      # --- BUILD TAKA-REPORT (For Stats Generation) ---
      - name: Build Taka-Report
        run: |
          env GOOS=linux GOARCH=amd64 go build -o taka-report-linux-amd64 cmd/report/main.go
          env GOOS=darwin GOARCH=amd64 go build -o taka-report-darwin-amd64 cmd/report/main.go
          env GOOS=darwin GOARCH=arm64 go build -o taka-report-darwin-arm64 cmd/report/main.go

      # --- UPLOAD EVERYTHING ---
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            taka-upload-linux-amd64
            taka-upload-darwin-amd64
            taka-upload-darwin-arm64
            taka-report-linux-amd64
            taka-report-darwin-amd64
            taka-report-darwin-arm64
